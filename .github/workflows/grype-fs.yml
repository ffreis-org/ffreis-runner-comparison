name: DevOps / Grype FS

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  grype-fs:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scan-grype-fs.yml@v1.2.0
    with:
      scan-ref: .
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
