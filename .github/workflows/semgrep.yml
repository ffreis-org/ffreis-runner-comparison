name: Semgrep (SAST)

on:
  workflow_dispatch:
  schedule:
    - cron: "17 17 24 * *"  # monthly scattered (was: 0 8 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-semgrep.yml@v1.0.1
