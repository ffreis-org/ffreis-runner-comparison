name: DevOps / Stale

on:
  schedule:
    - cron: "20 14 21 * *"  # monthly scattered (was: 0 6 * * 1)
  workflow_dispatch:
  push:
    branches: [main]


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stale:
    permissions:
      issues: write
      pull-requests: write
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-stale.yml@v1.2.0
    with:
      only: "both"
