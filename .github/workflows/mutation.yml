name: Mutation Testing (mutmut)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/mutation.yml"
  push:
    branches: [main]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/mutation.yml"
  schedule:
    - cron: "0 2 * * 0" # Sundays 02:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutation:
    if: ${{ !github.event.pull_request.draft }}
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-mutation.yml@1ce012b023b91e4c293846af4cfd93062d36d1be
    with:
      python-version: "3.11"
      uv-extras: "dev"
      paths-to-mutate: "orchestrator workloads"
      threshold: 70

