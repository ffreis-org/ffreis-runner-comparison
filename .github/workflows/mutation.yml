name: Mutation Testing (mutmut)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/mutation.yml"
  push:
    branches: [main]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/mutation.yml"
  schedule:
    - cron: "0 2 * * 0" # Sundays 02:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-mutation.yml@v1.0.1
    with:
      python-version: "3.11"
      uv-extras: "dev"
      paths-to-mutate: "orchestrator workloads"
      threshold: 80

