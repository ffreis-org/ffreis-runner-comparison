name: DevOps / Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@v1.2.0
