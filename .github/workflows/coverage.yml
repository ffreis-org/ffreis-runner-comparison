name: Code Coverage (Codecov)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/coverage.yml"
  push:
    branches: [ main ]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/coverage.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-coverage.yml@v1.0.1
    with:
      python-version: "3.11"
      uv-extras: "dev"
      coverage-command: "uv run pytest --cov=orchestrator --cov=workloads --cov-report=xml tests"
      coverage-file: "coverage.xml"
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
