name: Code Coverage (Codecov)

on:
  pull_request:
    branches: [ main ]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/coverage.yml"
  push:
    branches: [ main ]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/coverage.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    if: ${{ !github.event.pull_request.draft }}
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-coverage.yml@1ce012b023b91e4c293846af4cfd93062d36d1be
    with:
      python-version: "3.11"
      uv-extras: "dev"
      coverage-command: "uv run pytest --cov=orchestrator --cov=workloads --cov-report=xml tests"
      coverage-file: "coverage.xml"
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
