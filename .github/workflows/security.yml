name: Code Security (Dependency Audit)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "21 17 10 * *"  # monthly scattered (was: 0 9 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deps-security:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-python/.github/workflows/python-security.yml@v1.0.1
    with:
      python-version: "3.11"
      uv-extras: "dev"

