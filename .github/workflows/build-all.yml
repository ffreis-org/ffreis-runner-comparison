name: Build All (Python)

on:
  pull_request:
    branches: [ main ]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/build-all.yml"
  push:
    branches: [ main ]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/build-all.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  matrix-build:
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-build.yml@1ce012b023b91e4c293846af4cfd93062d36d1be
    with:
      python-versions: '["3.11"]'
