name: Build All (Python)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/build-all.yml"
  push:
    branches: [ main ]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/build-all.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix-build:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-build.yml@v1.0.1
    with:
      python-versions: '["3.11"]'
