name: Build All (Python)

on:
  workflow_dispatch:
    inputs:
      build_macos:
        description: "Also build on macOS (10x Actions billing — manual cross-platform check only)"
        type: boolean
        default: false
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/build-all.yml"
  push:
    branches: [ main ]
    paths:
      - "orchestrator/**"
      - "workloads/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/build-all.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix-build:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-python/.github/workflows/python-build.yml@v1.0.1
    with:
      # COST GUARD: macOS Actions minutes bill 10x and every artifact here is
      # Linux-only (arm64 Lambdas / Linux containers), so macOS is OFF in the
      # normal push/PR/schedule flow. It runs ONLY via manual workflow_dispatch
      # with build_macos=true. Do NOT hardcode "macos-latest" back here — that
      # silently restores the 10x drain on every run (CI cost incident 2026-06).
      os-list: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_macos) && '["ubuntu-latest","macos-latest"]' || '["ubuntu-latest"]' }}
      # PR runs the primary version only (cost); full matrix on schedule/dispatch/push.
      python: ${{ github.event_name == 'pull_request' && '["3.13"]' || '["3.13","3.11","3.10"]' }}

      python-versions: '["3.11"]'
