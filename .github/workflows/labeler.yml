name: DevOps / Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-labeler.yml@v1.2.0
    with:
      rules-json: |-
        [
          {"label": "ci", "title": "/ci/i"},
          {"label": "infra", "title": "/infra/i"}
        ]
